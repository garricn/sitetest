name: CI

on:
  push:
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Checkout sitecap (file: dependency)
        uses: actions/checkout@v6
        with:
          repository: garricn/sitecap
          path: ../sitecap

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install deps
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium

      - name: Lint + test
        run: make check
