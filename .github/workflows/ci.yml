name: CI

on:
  push:
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Checkout sitecap (file: dependency)
        uses: actions/checkout@v6
        with:
          repository: garricn/sitecap
          path: ../sitecap

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install deps
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium

      - name: Lint + test
        run: make check

      - name: Upload captures artifact
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: captures
          path: |
            __captures__/
            test/**/__captures__/
          if-no-files-found: ignore
          retention-days: 14

      - name: Comment on PR with artifact link
        if: failure() && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          gh api repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments \
            -f body="## Snapshot diffs detected

          Tests failed — capture artifacts may contain visual diffs.

          [View CI run and download artifacts](${RUN_URL})"
